name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pkg
        run: npm install -g pkg

      - name: Build executable
        run: pkg . --targets node18-win-x64 --output dist/DashboardLauncher.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DashboardLauncher
          path: dist/DashboardLauncher.exe
